name: birthday clown debug

on:
  workflow_dispatch:

jobs:
  send-wishes:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v5

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: install dependencies
        run: pip install -r requirements.txt

      - name: run clown
        run: python clown.py
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          BIRTHDAY_PING_ROLE: ${{ secrets.BIRTHDAY_PING_ROLE }}
          CALENDAR_URL: ${{ secrets.CALENDAR_URL }}
          ENV: dev
